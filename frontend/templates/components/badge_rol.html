{% with r=rol|default:'' %}
    {% if r == "admin_sitrep" %}
        <span class="inline-flex items-center rounded-[4px] border border-info-border bg-info-bg px-2 py-0.5 text-[11px] font-semibold text-info">Admin SITREP</span>
    {% elif r == "admin_naviera" %}
        <span class="inline-flex items-center rounded-[4px] border border-info-border bg-info-bg px-2 py-0.5 text-[11px] font-semibold text-info">Admin Naviera</span>
    {% elif r == "capitan" %}
        <span class="inline-flex items-center rounded-[4px] border border-warn-border bg-warn-bg px-2 py-0.5 text-[11px] font-semibold text-warn">Capitán</span>
    {% elif r == "tierra" %}
        <span class="inline-flex items-center rounded-[4px] border border-neutral-border bg-neutral-bg px-2 py-0.5 text-[11px] font-semibold text-neutral">Tierra</span>
    {% elif r == "mar" %}
        <span class="inline-flex items-center rounded-[4px] border border-ok-border bg-ok-bg px-2 py-0.5 text-[11px] font-semibold text-ok">Mar</span>
    {% else %}
        <span class="inline-flex items-center rounded-[4px] border border-neutral-border bg-neutral-bg px-2 py-0.5 text-[11px] font-semibold text-neutral">{{ r }}</span>
    {% endif %}
{% endwith %}
