<div
    x-data="{
        visible: false,
        mensaje: '',
        tipo: 'ok',
        _timer: null,
        estilos: {
            ok: 'border-ok-border bg-ok-bg text-ok',
            warn: 'border-warn-border bg-warn-bg text-warn',
            fail: 'border-fail-border bg-fail-bg text-fail',
            neutral: 'border-neutral-border bg-neutral-bg text-neutral'
        }
    }"
    @sitrep:toast.window="
        mensaje = $event.detail.mensaje;
        tipo = $event.detail.tipo || 'ok';
        visible = true;
        clearTimeout(_timer);
        _timer = setTimeout(() => { visible = false }, $event.detail.duracion || 3200);
    "
    x-show="visible"
    x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-2 motion-reduce:translate-y-0"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-2 motion-reduce:translate-y-0"
    class="pointer-events-none fixed inset-x-0 bottom-6 z-[60] flex justify-center px-4"
>
    <div
        role="status"
        aria-live="polite"
        class="pointer-events-auto flex items-center gap-2 rounded-xl border px-4 py-2.5 text-[13px] font-semibold shadow-sm"
        :class="estilos[tipo] || estilos.ok"
    >
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4"/>
            <path
                :d="tipo === 'fail' ? 'M6 6l4 4M10 6l-4 4' : 'M5 8.2l2 2 4-4.4'"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
        <span x-text="mensaje"></span>
    </div>
</div>
