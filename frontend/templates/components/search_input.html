{% comment %}Variables: placeholder, name (default: q), value{% endcomment %}
<div class="relative">
    <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-ink-muted">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.3"/>
            <line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
    </span>
    <input
        type="text"
        name="{{ name|default:'q' }}"
        value="{{ value|default:'' }}"
        placeholder="{{ placeholder }}"
        class="h-9 w-72 rounded-md border border-surface-border bg-white pl-9 pr-3 text-[13px] text-ink outline-none focus:border-brand"
    >
</div>
