<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}SITREP{% endblock %}</title>
</head>
{# Shell transaccional por defecto de SITREP. Layout con tablas y estilos inline
   a propósito: los clientes de correo ignoran <style>/CSS externo. Colores de
   marca: navy #0f2d4a, brand #1d4ed8. #}
<body style="margin:0; padding:0; background-color:#f1f5f9; font-family:Arial,Helvetica,sans-serif; color:#0f172a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px; background-color:#ffffff; border-radius:12px; overflow:hidden; border:1px solid #e2e8f0;">
          <tr>
            <td style="background-color:#0f2d4a; padding:24px 32px;">
              <span style="color:#ffffff; font-size:13px; font-weight:bold; letter-spacing:0.24em; text-transform:uppercase;">SITREP</span>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              {% block contenido %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px; background-color:#f8fafc; border-top:1px solid #e2e8f0;">
              <p style="margin:0; font-size:12px; line-height:18px; color:#64748b;">
                Este es un correo automático de SITREP · Sistema de Gestión de Seguridad Marítima.
                No respondas a este mensaje.
              </p>
              <p style="margin:8px 0 0; font-size:12px; color:#94a3b8;">SITREP © 2026</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
