<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SITREP{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#0f2d4a', light: '#1a3f61', lighter: '#1e4976' },
                        brand: { DEFAULT: '#1d4ed8', light: '#3b82f6', dark: '#1e40af' },
                        surface: { DEFAULT: '#f0f4f8', card: '#ffffff', border: '#e2e8f0' },
                        ink: { DEFAULT: '#1e293b', secondary: '#475569', muted: '#94a3b8' },
                        ok: { DEFAULT: '#15803d', bg: '#f0fdf4', border: '#bbf7d0' },
                        warn: { DEFAULT: '#b45309', bg: '#fffbeb', border: '#fde68a' },
                        fail: { DEFAULT: '#b91c1c', bg: '#fef2f2', border: '#fecaca' },
                        info: { DEFAULT: '#1d4ed8', bg: '#eff6ff', border: '#bfdbfe' },
                        neutral: { DEFAULT: '#475569', bg: '#f8fafc', border: '#e2e8f0' },
                    },
                    fontFamily: {
                        sans: ['IBM Plex Sans', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['IBM Plex Mono', 'ui-monospace', 'monospace'],
                    },
                    fontSize: {
                        '2xs': ['0.625rem', { lineHeight: '0.875rem' }],
                    },
                }
            }
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}min-h-screen bg-surface text-ink font-sans antialiased{% endblock %}">
    {% block layout %}
        {% block content %}{% endblock %}
    {% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
