{% if variant == "detalle" %}
<button
    type="button"
    @click="abierto = !abierto"
    :class="abierto ? 'shadow-sm' : ''"
    :style="{ top: _offsetStickyAreas() + 'px' }"
    class="sticky z-20 -mx-[5px] flex w-[calc(100%+10px)] items-center gap-3 rounded-lg border px-[21px] py-3 text-left transition hover:opacity-95 {% if grupo.area %}{{ grupo.area.css_classes }}{% else %}border-surface-border bg-neutral-bg text-ink-secondary{% endif %}"
>
    <span class="h-2.5 w-2.5 shrink-0 rounded-full bg-current opacity-70"></span>
    <span class="flex-1 text-[13px] font-bold">{{ grupo.nombre_display }}</span>
    <span class="text-[11px] opacity-80">{{ grupo.con_ficha }}/{{ grupo.total }}</span>
    <svg
        viewBox="0 0 18 18"
        class="h-4 w-4 transition-transform opacity-75"
        :class="abierto ? 'rotate-180' : ''"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
    >
        <path d="M4 7L9 12L14 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>
{% elif variant == "nave" %}
<button
    type="button"
    @click="abierto = !abierto"
    class="flex w-full items-center gap-3 rounded-md border border-surface-border bg-[#fcfdff] px-3 py-2.5 text-left transition hover:bg-white"
>
    <span class="inline-flex items-center gap-2 rounded-full border px-2 py-0.5 text-[10px] font-bold {% if grupo.area %}{{ grupo.area.css_classes }}{% else %}border-surface-border bg-neutral-bg text-ink-secondary{% endif %}">
        <span class="h-1.5 w-1.5 rounded-full bg-current opacity-70"></span>
        {{ grupo.nombre_display }}
    </span>
    <span class="flex-1 text-[11px] text-ink-muted">{{ grupo.con_ficha }}/{{ grupo.total }}</span>
    <svg
        viewBox="0 0 18 18"
        class="h-3.5 w-3.5 text-ink-muted transition-transform"
        :class="abierto ? 'rotate-180' : ''"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
    >
        <path d="M4 7L9 12L14 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>
{% else %}
<button
    type="button"
    @click="abierto = !abierto"
    class="flex w-full items-center gap-3 rounded-lg border border-surface-border bg-white px-4 py-3 text-left transition hover:bg-[#fafcff]"
>
    <span class="inline-flex items-center gap-2 rounded-full border px-2.5 py-1 text-[11px] font-bold {% if grupo.area %}{{ grupo.area.css_classes }}{% else %}border-surface-border bg-neutral-bg text-ink-secondary{% endif %}">
        <span class="h-2 w-2 rounded-full bg-current opacity-70"></span>
        {{ grupo.nombre_display }}
    </span>
    <span class="flex-1 text-[11px] text-ink-muted">{{ grupo.con_ficha }}/{{ grupo.total }}</span>
    <svg
        viewBox="0 0 18 18"
        class="h-4 w-4 text-ink-muted transition-transform"
        :class="abierto ? 'rotate-180' : ''"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
    >
        <path d="M4 7L9 12L14 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>
{% endif %}
